services:
  db:
    image: postgres:16-alpine
    container_name: orderhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderhub
    ports:
      - "5432:5432"
    volumes:
      - orderhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orderhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderhub-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/orderhub?schema=public"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-please-generate-a-real-secret}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      SEED_ON_START: "${SEED_ON_START:-true}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@orderhub.com}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-Admin@12345}"
    ports:
      - "3000:3000"

volumes:
  orderhub-pgdata:
