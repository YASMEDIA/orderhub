# Render Blueprint — provisions a PostgreSQL database + the OrderHub web service.
# In Render: New + → "Blueprint" → connect this repo → Apply.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: orderhub-db
    databaseName: orderhub
    user: orderhub
    plan: free

services:
  - type: web
    name: orderhub
    runtime: node
    plan: free
    # Build only needs the app (Next pages are dynamic, no DB at build time).
    buildCommand: npm install && npm run build
    # Migrate + seed run at STARTUP, where the database is guaranteed reachable.
    # Seed is idempotent; made non-fatal so the app always starts.
    startCommand: npx prisma migrate deploy && (npm run db:seed || echo "seed skipped") && npm run start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orderhub-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: NODE_VERSION
        value: "20"
      # Set these two to your live Render URL after the first deploy
      # (e.g. https://orderhub.onrender.com), then redeploy.
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Initial Super Admin (change the password after first login)
      - key: SEED_ADMIN_EMAIL
        value: admin@orderhub.com
      - key: SEED_ADMIN_PASSWORD
        value: Admin@12345
      # Invoice email delivery (SMTP). New orders email their invoice PDF
      # automatically. SMTP_PASS is a Gmail App Password — set it in the
      # Render dashboard (kept out of source control).
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: Mustafaq81012@gmail.com
      - key: SMTP_FROM
        value: Mustafaq81012@gmail.com
      - key: SMTP_PASS
        value: crxzwlppoypbpuna # Gmail App Password — rotate after go-live
      - key: INVOICE_NOTIFY_EMAIL
        value: Malyaseri9@gmail.com
