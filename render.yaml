# Render Blueprint — provisions a PostgreSQL database + the OrderHub web service.
# In Render: New + → "Blueprint" → connect this repo → Apply.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: orderhub-db
    databaseName: orderhub
    user: orderhub
    plan: free

services:
  - type: web
    name: orderhub
    runtime: node
    plan: free
    # Install → run DB migrations → seed (idempotent) → build Next.js.
    buildCommand: npm install && npx prisma migrate deploy && npm run db:seed && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orderhub-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: NODE_VERSION
        value: "20"
      # Set these two to your live Render URL after the first deploy
      # (e.g. https://orderhub.onrender.com), then redeploy.
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Initial Super Admin (change the password after first login)
      - key: SEED_ADMIN_EMAIL
        value: admin@orderhub.com
      - key: SEED_ADMIN_PASSWORD
        value: Admin@12345
