name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Validate, typecheck & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orderhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d orderhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/orderhub?schema=public"
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Use the lockfile when present (reproducible); fall back on first run.
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to test database
        # Exercises the committed migration(s) in prisma/migrations.
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
