name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Validate, typecheck & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mahalatly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mahalatly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/mahalatly?schema=public"
      # Schema declares directUrl = env("DIRECT_URL"); migrate deploy needs it.
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/mahalatly?schema=public"
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` — the repo ships no committed package-lock.json,
          # and setup-node's npm cache requires a lockfile to exist.

      - name: Install dependencies
        # Prefer the lockfile (reproducible); fall back to npm install when it's
        # out of sync (e.g. a dependency was added without regenerating the lock).
        run: npm ci || npm install

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to test database
        # Exercises the committed migration(s) in prisma/migrations.
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
